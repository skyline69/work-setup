general {
    hide_cursor = true
    immediate_render = true
    fractional_scaling = 2
}

auth {
    pam:enabled = true
    fingerprint:enabled = false
}

animations {
    enabled = true
    bezier = smooth, 0.2, 0.6, 0.2, 1.0
    animation = fadeIn, 1, 2.0, smooth
    animation = fadeOut, 1, 2.0, smooth
    animation = inputFieldColors, 1, 2.0, smooth
    animation = inputFieldWidth, 1, 2.0, smooth
}

background {
    monitor =
    path = /home/skyline/Pictures/Wallpapers/a_foggy_landscape_with_trees_and_grass.jpg
    color = rgba(16, 26, 20, 1.0)
    blur_passes = 3
    blur_size = 7
    noise = 0.02
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.35
    vibrancy_darkness = 0.2
}

shape {
    monitor =
    size = 100%, 100%
    color = rgba(12, 22, 16, 0.5)
    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}

label {
    monitor =
    text = $TIME
    color = rgba(170, 255, 190, 1.0)
    font_size = 86
    font_family = Noto Sans Bold
    position = 0, 20
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(150, 235, 175, 1.0)
    font_size = 20
    font_family = Noto Sans
    position = 0, 110
    halign = center
    valign = center
    zindex = 2
}

input-field {
    monitor =
    size = 24%, 6%
    outline_thickness = 2
    inner_color = rgba(28, 52, 36, 0.7)
    outer_color = rgba(120, 200, 140, 0.95)
    check_color = rgba(110, 220, 150, 0.98)
    fail_color = rgba(205, 85, 95, 0.9)
    font_color = rgba(220, 255, 230, 1.0)
    fade_on_empty = false
    rounding = 16
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    position = 0, -120
    halign = center
    valign = center
    zindex = 3
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.6)
}

label {
    monitor =
    text = $ATTEMPTS[ ]
    color = rgba(230, 120, 120, 1.0)
    font_size = 14
    font_family = Noto Sans
    position = 0, 220
    halign = center
    valign = center
    zindex = 2
}
